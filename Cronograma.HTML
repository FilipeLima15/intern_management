<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cronograma de Estudo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex overflow-hidden">

    <div id="sidebar-container"></div>

    <main class="flex-1 flex flex-col min-w-0 bg-gray-50 overflow-hidden">
        <header class="bg-white border-b border-gray-200 h-16 px-6 flex justify-between items-center shadow-sm shrink-0">
            <div>
                <h1 class="text-xl font-bold text-gray-800">Cronograma Semanal</h1>
                <p class="text-xs text-gray-500">Organize seus horários de estudo (Salvo na Nuvem)</p>
            </div>
            
            <div class="flex gap-2">
                <button id="manualSaveBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-2 hidden">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Salvar Agora
                </button>
                <button id="clearChecksBtn" class="bg-gray-100 hover:bg-red-50 text-gray-500 hover:text-red-500 border border-gray-200 hover:border-red-200 px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-2">
                    <i class="fa-solid fa-circle-check"></i> Limpar Checks
                </button>
                <button id="addRowBtn" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Novo Horário
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 scroll-smooth">
            
            <div id="toolbarWrapper" class="bg-white rounded-xl border border-gray-200 shadow-sm mb-4 sticky top-0 z-20">
            <div class="p-2 flex flex-wrap items-center gap-2">
                <div class="flex gap-1 pr-3 border-r border-gray-100">
                    <button id="boldBtn" class="tool-btn" title="Negrito (Ctrl+B)"><i class="fas fa-bold"></i></button>
                    <button id="underlineBtn" class="tool-btn" title="Sublinhado (Ctrl+U)"><i class="fas fa-underline"></i></button>
                </div>
                <div class="flex gap-2 items-center pr-3 border-r border-gray-100">
                    <button id="applyTextColorBtn" class="text-xs font-medium text-gray-600 hover:text-sky-600 px-2 py-1 rounded hover:bg-gray-100">Aplicar texto</button>
                    <button id="applyFillBtn" class="text-xs font-medium text-gray-600 hover:text-sky-600 px-2 py-1 rounded hover:bg-gray-100">Pintar fundo</button>
                    <!-- inputs ocultos — usados apenas pelo botão + -->
                    <input type="color" id="textColorPicker" value="#000000" style="display:none;">
                    <input type="color" id="fillColorPicker" value="#eef2ff" style="display:none;">
                </div>

                <div class="flex gap-1 pr-3 border-r border-gray-100">
                    <button id="alignLeftBtn" class="tool-btn"><i class="fas fa-align-left"></i></button>
                    <button id="alignCenterBtn" class="tool-btn"><i class="fas fa-align-center"></i></button>
                    <button id="alignRightBtn" class="tool-btn"><i class="fas fa-align-right"></i></button>
                </div>
                <div class="flex gap-2 items-center ml-auto">
                    <button id="multiSelectBtn" class="px-3 py-1.5 rounded text-xs font-bold border border-gray-200 text-gray-600 hover:bg-sky-50 hover:text-sky-600 hover:border-sky-200 transition">
                        <i class="fa-solid fa-check-double mr-1"></i> Multi-seleção
                    </button>
                    <button id="undoBtn" class="tool-btn" title="Desfazer (Ctrl+Z)"><i class="fas fa-rotate-left"></i></button>
                </div>
            </div>
            <!-- Faixa fixa de cores favoritas -->
            <div id="favColorBar" class="flex items-center gap-2 flex-wrap px-3 py-1.5 bg-gray-50 border-t border-gray-100 rounded-b-xl text-xs text-gray-400">
                <span class="font-medium text-gray-400 text-xs">Texto:</span>
                <div id="favTextColors" class="flex gap-1 items-center"></div>
                <div class="w-px h-4 bg-gray-200 mx-1"></div>
                <span class="font-medium text-gray-400 text-xs">Fundo:</span>
                <div id="favFillColors" class="flex gap-1 items-center"></div>
            </div>
            </div>

            <div class="bg-white rounded-xl shadow-md border border-gray-200 flex flex-col flex-1 overflow-hidden h-full min-h-[400px]">
                <div class="overflow-auto h-full relative"> 
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th class="w-24">Horário</th>
                                <th class="min-w-[120px]">Dom</th>
                                <th class="min-w-[120px]">Seg</th>
                                <th class="min-w-[120px]">Ter</th>
                                <th class="min-w-[120px]">Qua</th>
                                <th class="min-w-[120px]">Qui</th>
                                <th class="min-w-[120px]">Sex</th>
                                <th class="min-w-[120px]">Sáb</th>
                                <th class="w-16"><i class="fa-solid fa-gear"></i></th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                </div>
                
                <div id="loadingMessage" class="hidden text-center py-12 text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-sky-500"></i>
                    <p>Carregando cronograma...</p>
                </div>

                <div id="emptyMessage" class="hidden text-center py-12 text-gray-400">
                    <i class="fa-regular fa-calendar text-4xl mb-3 opacity-50"></i>
                    <p>Nenhum horário cadastrado.</p>
                </div>
            </div>

            <div class="mt-4 flex justify-between items-center text-xs text-gray-500 px-2">
                <div id="saveIndicator" class="flex items-center gap-2">
                    <i class="fas fa-circle-notch fa-spin text-gray-400" id="saveIcon"></i>
                    <span id="saveStatus">Aguardando login...</span>
                </div>
                <div>Total de horários: <span id="totalRows" class="font-bold">0</span></div>
            </div>
            <div class="h-10"></div>
        </div>
    </main>

    <script type="module">
    console.log("🚀 Iniciando Script Cronograma (Versão Corrigida)...");

    import { db, auth } from "./firebase-config.js";
    import { ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    // CORREÇÃO: Adicionado signOut
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Elementos DOM
    const scheduleBody = document.getElementById('scheduleBody');
    const addRowBtn = document.getElementById('addRowBtn');
    const manualSaveBtn = document.getElementById('manualSaveBtn');
    const saveIndicator = document.getElementById('saveIndicator');
    const saveStatus = document.getElementById('saveStatus');
    const saveIcon = document.getElementById('saveIcon');
    const totalRowsElement = document.getElementById('totalRows');
    const emptyMessage = document.getElementById('emptyMessage');
    const loadingMessage = document.getElementById('loadingMessage');

    // Toolbar elements
    const boldBtn = document.getElementById('boldBtn');
    const underlineBtn = document.getElementById('underlineBtn');
    const textColorPicker = document.getElementById('textColorPicker');
    const fillColorPicker = document.getElementById('fillColorPicker');
    const applyFillBtn = document.getElementById('applyFillBtn');
    const applyTextColorBtn = document.getElementById('applyTextColorBtn');
    const alignLeftBtn = document.getElementById('alignLeftBtn');
    const alignCenterBtn = document.getElementById('alignCenterBtn');
    const alignRightBtn = document.getElementById('alignRightBtn');
    const multiSelectBtn = document.getElementById('multiSelectBtn');
    const undoBtn = document.getElementById('undoBtn');

    // Estado Global
    let scheduleData = []; 
    let currentUserUID = null;
    const undoStack = [];
    const UNDO_LIMIT = 50;
    let dragSrcIndex = null;
    let multiSelectMode = false;
    const selectedCells = new Set();
    let isMouseDownForSelect = false;
    let focusedCell = null; // Guarda a célula onde o cursor está no momento

    // checks[rowIndex][colIndex] = true/false — salvo junto com o cronograma
    // Cores favoritas separadas para texto e fundo
    let favTextColors = [
        '#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6',
        '#8b5cf6', '#ec4899', '#000000', '#6b7280', '#ffffff'
    ];
    let favFillColors = [
        '#fef2f2', '#fff7ed', '#fefce8', '#f0fdf4', '#eff6ff',
        '#f5f3ff', '#fdf4ff', '#f9fafb', '#e5e7eb', '#ffffff'
    ];

    // --- AUTHENTICATION ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("✅ Usuário logado:", user.email);
            currentUserUID = user.uid;
            manualSaveBtn.classList.remove('hidden'); // Mostra botão de salvar manual
            setStatus('loading', 'Sincronizando...');
            loadFromFirebase();
            loadFavColors();
        } else {
            console.warn("⚠️ Usuário não logado.");
            currentUserUID = null;
            scheduleData = [];
            renderTable([]);
            manualSaveBtn.classList.add('hidden');
            setStatus('error', 'Faça login para ver seu cronograma.');
            // Redireciona se não estiver logado
            window.location.href = 'index.html';
        }
    });

    // --- HELPERS ---
    function cloneDeep(obj) { return JSON.parse(JSON.stringify(obj)); }
    
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    function setStatus(type, msg) {
        if(!saveStatus || !saveIndicator) return;
        saveStatus.textContent = msg;
        saveIndicator.className = 'flex items-center gap-2';
        
        if(type === 'saving' || type === 'loading') {
            saveIndicator.classList.add('text-sky-500');
            saveIcon.className = 'fas fa-sync-alt fa-spin';
        } else if (type === 'saved') {
            saveIndicator.classList.add('text-green-600');
            saveIcon.className = 'fas fa-check-circle';
        } else if (type === 'error') {
            saveIndicator.classList.add('text-red-500');
            saveIcon.className = 'fas fa-exclamation-circle';
        } else {
            saveIndicator.classList.add('text-gray-400');
            saveIcon.className = 'fas fa-clock';
        }
    }

    // --- FIREBASE CRUD BLINDADO ---
    async function loadFromFirebase() {
        if (!currentUserUID) return;
        
        scheduleBody.innerHTML = '';
        loadingMessage.classList.remove('hidden');
        emptyMessage.classList.add('hidden');

        try {
            const snapshot = await get(ref(db, `users/${currentUserUID}/cronograma`));
            if (snapshot.exists()) {
                let data = snapshot.val();
                
                // CORREÇÃO CRÍTICA: Se o Firebase devolver Objeto em vez de Array, convertemos
                if (data && typeof data === 'object' && !Array.isArray(data)) {
                    console.log("⚠️ Detectado formato Objeto no Firebase, convertendo para Array...");
                    data = Object.values(data);
                }

                if (!Array.isArray(data)) data = [];

                scheduleData = data.map(r => ({
                    time: r.time || '',
                    days: r.days || Array(7).fill(''),
                    timeBg: r.timeBg||'', bg: r.bg||Array(7).fill(''),
                    timeColor: r.timeColor||'', color: r.color||Array(7).fill(''),
                    timeAlign: r.timeAlign||'', align: r.align||Array(7).fill(''),
                    // checks: array de 8 posições (0=horário, 1-7=dias)
                    checks: r.checks||Array(8).fill(false)
                }));
            } else {
                // Dados padrão
                console.log("ℹ️ Nenhum dado encontrado, criando padrão...");
                scheduleData = [
                    { time: '08:00', days: ['Descanso', 'Português', 'Matemática', 'Direito Const.', 'Informática', 'Revisão', 'Simulado'], bg:[], color:[], align:[], checks: Array(8).fill(false) },
                    { time: '14:00', days: ['Lazer', 'Dir. Admin', 'Raciocínio', 'Dir. Penal', 'Atualidades', 'Lei Seca', 'Correção'], bg:[], color:[], align:[], checks: Array(8).fill(false) }
                ];
                saveToFirebase(true); 
            }
            loadingMessage.classList.add('hidden');
            renderTable(scheduleData);
            setStatus('saved', 'Sincronizado');
        } catch (e) {
            console.error("🚨 Erro fatal no load:", e);
            loadingMessage.classList.add('hidden');
            setStatus('error', 'Erro ao carregar dados.');
        }
    }

    async function saveToFirebase(silent = false) {
        if (!currentUserUID) {
            alert("Você não está logado!");
            return;
        }
        if (!silent) setStatus('saving', 'Salvando...');
        
        try {
            // Garante que estamos salvando um Array puro, sem undefined
            const dataToSave = JSON.parse(JSON.stringify(scheduleData));
            
            await set(ref(db, `users/${currentUserUID}/cronograma`), dataToSave);
            console.log("💾 Salvo com sucesso no Firebase!");
            if (!silent) setStatus('saved', 'Salvo na nuvem');
        } catch (e) {
            console.error("🚨 Erro fatal no save:", e);
            setStatus('error', 'Erro ao salvar. Tente novamente.');
            alert("Erro ao salvar! Verifique sua conexão.");
        }
    }
    
    // Auto-save com delay de 1.5s
    const debouncedSave = debounce(saveToFirebase, 1500);

    // Botão Manual para garantir
    if(manualSaveBtn) {
        manualSaveBtn.addEventListener('click', () => {
            saveToFirebase(false);
        });
    }

    // --- UNDO/REDO & STATE ---
    function pushSnapshot() {
        const snapshot = cloneDeep(scheduleData);
        undoStack.push(snapshot);
        if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    }

    function undo() {
        if (undoStack.length === 0) return;
        const prev = undoStack.pop();
        scheduleData = cloneDeep(prev);
        renderTable(scheduleData);
        saveToFirebase();
    }

    // --- SELEÇÃO ---
    function clearSelection() {
        selectedCells.forEach(div => div.classList.remove('selected-cell'));
        selectedCells.clear();
    }

    function toggleCell(div) {
        if (selectedCells.has(div)) {
            div.classList.remove('selected-cell');
            selectedCells.delete(div);
        } else {
            div.classList.add('selected-cell');
            selectedCells.add(div);
        }
    }

    // --- RENDER ---
    function renderTable(data) {
        scheduleBody.innerHTML = '';
        const rows = data || [];

        if (rows.length === 0) {
            emptyMessage.classList.remove('hidden');
            totalRowsElement.textContent = 0;
            return;
        }
        emptyMessage.classList.add('hidden');

        rows.forEach((row, rowIndex) => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-row', rowIndex);

            // Coluna Horário
            const timeCell = document.createElement('td');
            timeCell.className = 'time-cell';
            if (row.timeBg) timeCell.style.backgroundColor = row.timeBg;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'editable-content';
            timeDiv.contentEditable = true;
            timeDiv.dataset.row = rowIndex;
            timeDiv.dataset.col = 'time';
            timeDiv.innerHTML = row.time || '';
            if (row.timeColor) timeDiv.style.color = row.timeColor;
            if (row.timeAlign) timeDiv.style.textAlign = row.timeAlign;
            
            // Botão check da coluna horário (posição 0)
            const timeCheck = document.createElement('button');
            timeCheck.className = 'cell-check';
            timeCheck.dataset.row = rowIndex;
            timeCheck.dataset.checkCol = '0';
            const isTimeChecked = row.checks && row.checks[0];
            timeCheck.innerHTML = isTimeChecked
                ? '<i class="fas fa-circle-check" style="color:#22c55e;font-size:14px;"></i>'
                : '<i class="far fa-circle" style="color:#d1d5db;font-size:14px;"></i>';
            timeCell.style.position = 'relative';
            timeCell.appendChild(timeDiv);
            timeCell.appendChild(timeCheck);
            tr.appendChild(timeCell);

            // Colunas Dias (0 a 6)
            (row.days || Array(7).fill('')).forEach((html, dayIndex) => {
                const td = document.createElement('td');
                if (row.bg && row.bg[dayIndex]) td.style.backgroundColor = row.bg[dayIndex];
                
                const div = document.createElement('div');
                div.className = 'editable-content';
                div.contentEditable = true;
                div.dataset.row = rowIndex;
                div.dataset.col = String(dayIndex);
                div.innerHTML = html || '';
                if (row.color && row.color[dayIndex]) div.style.color = row.color[dayIndex];
                if (row.align && row.align[dayIndex]) div.style.textAlign = row.align[dayIndex];

                // Botão check da coluna dia (posição dayIndex+1)
                const checkBtn = document.createElement('button');
                checkBtn.className = 'cell-check';
                checkBtn.dataset.row = rowIndex;
                checkBtn.dataset.checkCol = String(dayIndex + 1);
                const isChecked = row.checks && row.checks[dayIndex + 1];
                checkBtn.innerHTML = isChecked
                    ? '<i class="fas fa-circle-check" style="color:#22c55e;font-size:14px;"></i>'
                    : '<i class="far fa-circle" style="color:#d1d5db;font-size:14px;"></i>';
                td.style.position = 'relative';
                td.appendChild(div);
                td.appendChild(checkBtn);
                tr.appendChild(td);
            });

            // Coluna Ações
            const actionCell = document.createElement('td');
            actionCell.className = 'action-cell';
            const actionWrap = document.createElement('div');
            actionWrap.className = 'action-wrap';

            const dragBtn = document.createElement('button');
            dragBtn.className = 'btn-action drag-handle';
            dragBtn.innerHTML = '<i class="fas fa-grip-vertical"></i>';
            dragBtn.draggable = true;
            dragBtn.dataset.row = rowIndex;

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-action delete';
            delBtn.innerHTML = '<i class="fas fa-trash"></i>';
            delBtn.dataset.row = rowIndex;
            delBtn.onclick = () => deleteRow(rowIndex);

            actionWrap.appendChild(dragBtn);
            actionWrap.appendChild(delBtn);
            actionCell.appendChild(actionWrap);
            tr.appendChild(actionCell);
            scheduleBody.appendChild(tr);
        });

        totalRowsElement.textContent = rows.length;
        bindDragHandlers();
    }

    // --- ACTIONS ---
    function deleteRow(index) {
        if(!confirm("Excluir esta linha?")) return;
        pushSnapshot();
        scheduleData.splice(index, 1);
        renderTable(scheduleData);
        saveToFirebase();
    }

    if(addRowBtn) {
        addRowBtn.addEventListener('click', () => {
            pushSnapshot();
            const newRow = {
                time: '00:00',
                days: Array(7).fill(''),
                timeBg: '', bg: Array(7).fill(''),
                timeColor: '', color: Array(7).fill(''),
                timeAlign: 'center', align: Array(7).fill(''),
                checks: Array(8).fill(false)
            };
            scheduleData.push(newRow);
            renderTable(scheduleData);
            saveToFirebase();
        });
    }

    // --- EDIT EVENTS ---
    scheduleBody.addEventListener('input', (e) => {
        const el = e.target;
        if(!el.classList.contains('editable-content')) return;
        
        const row = parseInt(el.dataset.row);
        const col = el.dataset.col;
        const val = el.innerHTML;
        
        if (scheduleData[row]) {
            if(col === 'time') scheduleData[row].time = val;
            else scheduleData[row].days[col] = val;
            
            setStatus('saving', 'Digitando...');
            debouncedSave();
        }
    });

    // Rastreia qual célula está com o cursor/foco no momento
    scheduleBody.addEventListener('focusin', (e) => {
        const el = e.target.closest('.editable-content');
        if (el) focusedCell = el;
    });
    scheduleBody.addEventListener('focusout', (e) => {
        // Pequeno delay para não perder o foco ao clicar nos botões da toolbar
        setTimeout(() => { focusedCell = null; }, 200);
    });

    scheduleBody.addEventListener('mousedown', (e) => {
        const el = e.target.closest('.editable-content');
        if(!el) return;
        if(multiSelectMode) {
            e.preventDefault(); 
            isMouseDownForSelect = true;
            toggleCell(el);
        } else if(e.ctrlKey) {
            e.preventDefault();
            toggleCell(el);
        } else {
            clearSelection();
        }
    });

    document.addEventListener('mouseup', () => isMouseDownForSelect = false);
    scheduleBody.addEventListener('mouseover', (e) => {
        if(!isMouseDownForSelect || !multiSelectMode) return;
        const el = e.target.closest('.editable-content');
        if(el && !selectedCells.has(el)) {
            el.classList.add('selected-cell');
            selectedCells.add(el);
        }
    });

    if(multiSelectBtn) {
        multiSelectBtn.addEventListener('click', () => {
            multiSelectMode = !multiSelectMode;
            if(multiSelectMode) {
                multiSelectBtn.classList.add('bg-sky-100', 'text-sky-700', 'border-sky-300');
            } else {
                multiSelectBtn.classList.remove('bg-sky-100', 'text-sky-700', 'border-sky-300');
                clearSelection();
            }
        });
    }

    // --- CORES FAVORITAS ---
    function renderFavPanel(colors, containerId, type) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';

        colors.forEach((color, index) => {
            const btn = document.createElement('button');
            btn.title = `Favorita ${index + 1} — clique direito para trocar`;
            btn.style.cssText = `
                width: 18px; height: 18px; border-radius: 50%;
                background-color: ${color};
                border: 1.5px solid #d1d5db;
                cursor: pointer; flex-shrink: 0;
                transition: transform 0.1s, border-color 0.1s;
            `;

            // Clique esquerdo: aplica direto na célula
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (type === 'text') {
                    textColorPicker.value = color;
                    applyStyle('color', color);
                } else {
                    fillColorPicker.value = color;
                    applyStyle('background', color);
                }
            });

            // Clique direito: troca a cor favorita
            btn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const input = document.createElement('input');
                input.type = 'color';
                input.value = color;
                input.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
                document.body.appendChild(input);
                input.click();
                input.addEventListener('change', () => {
                    if (type === 'text') favTextColors[index] = input.value;
                    else favFillColors[index] = input.value;
                    renderFavPanel(type === 'text' ? favTextColors : favFillColors, containerId, type);
                    saveFavColors();
                    document.body.removeChild(input);
                });
                input.addEventListener('blur', () => {
                    setTimeout(() => { if (document.body.contains(input)) document.body.removeChild(input); }, 300);
                });
            });

            btn.addEventListener('mouseenter', () => { btn.style.transform = 'scale(1.3)'; btn.style.borderColor = '#6b7280'; });
            btn.addEventListener('mouseleave', () => { btn.style.transform = 'scale(1)'; btn.style.borderColor = '#d1d5db'; });
            container.appendChild(btn);
        });

        // Botão + para cor personalizada (abre RGB sem conflito)
        const plusBtn = document.createElement('button');
        plusBtn.title = 'Cor personalizada';
        plusBtn.style.cssText = `
            width: 18px; height: 18px; border-radius: 50%;
            border: 1.5px dashed #9ca3af;
            background: transparent; cursor: pointer;
            font-size: 13px; color: #9ca3af;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: border-color 0.1s, color 0.1s;
        `;
        plusBtn.textContent = '+';
        plusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const picker = type === 'text' ? textColorPicker : fillColorPicker;
            picker.click();
        });
        plusBtn.addEventListener('mouseenter', () => { plusBtn.style.borderColor = '#0284c7'; plusBtn.style.color = '#0284c7'; });
        plusBtn.addEventListener('mouseleave', () => { plusBtn.style.borderColor = '#9ca3af'; plusBtn.style.color = '#9ca3af'; });
        container.appendChild(plusBtn);
    }

    // Quando escolher cor no picker nativo (via botão +), aplica na célula
    textColorPicker.addEventListener('change', (e) => {
        applyStyle('color', e.target.value);
    });
    fillColorPicker.addEventListener('change', (e) => {
        applyStyle('background', e.target.value);
    });

    async function saveFavColors() {
        if (!currentUserUID) return;
        try {
            await set(ref(db, `users/${currentUserUID}/favTextColors`), favTextColors);
            await set(ref(db, `users/${currentUserUID}/favFillColors`), favFillColors);
        } catch (e) {
            console.error("Erro ao salvar cores favoritas:", e);
        }
    }

    async function loadFavColors() {
        if (!currentUserUID) return;
        try {
            const snapText = await get(ref(db, `users/${currentUserUID}/favTextColors`));
            if (snapText.exists() && Array.isArray(snapText.val()) && snapText.val().length === 10)
                favTextColors = snapText.val();

            const snapFill = await get(ref(db, `users/${currentUserUID}/favFillColors`));
            if (snapFill.exists() && Array.isArray(snapFill.val()) && snapFill.val().length === 10)
                favFillColors = snapFill.val();

        } catch (e) {
            console.error("Erro ao carregar cores favoritas:", e);
        }
        renderFavPanel(favTextColors, 'favTextColors', 'text');
        renderFavPanel(favFillColors, 'favFillColors', 'fill');
    }

    // --- STYLES ---
    function applyStyle(action, value = null) {
        // Define os alvos: multi-seleção, ou célula com foco, ou aviso
        let targets = Array.from(selectedCells);

        if (targets.length === 0 && focusedCell) {
            targets = [focusedCell];
        }

        if (targets.length === 0) {
            alert("⚠️ Clique em uma célula ou use Multi-seleção antes de aplicar o estilo.");
            return;
        }

        pushSnapshot();

        targets.forEach(el => {
            const row = el.dataset.row;
            const col = el.dataset.col;

            if (action === 'color') {
                el.style.color = value;
                if (col === 'time') scheduleData[row].timeColor = value;
                else scheduleData[row].color[col] = value;

            } else if (action === 'background') {
                const td = el.closest('td');
                if (td) td.style.backgroundColor = value;
                if (col === 'time') scheduleData[row].timeBg = value;
                else scheduleData[row].bg[col] = value;

            } else if (action === 'textAlign') {
                el.style.textAlign = value;
                if (col === 'time') scheduleData[row].timeAlign = value;
                else scheduleData[row].align[col] = value;

            } else if (action === 'bold') {
                el.focus();
                document.execCommand('bold', false, null);
                if (col === 'time') scheduleData[row].time = el.innerHTML;
                else scheduleData[row].days[col] = el.innerHTML;

            } else if (action === 'underline') {
                el.focus();
                document.execCommand('underline', false, null);
                if (col === 'time') scheduleData[row].time = el.innerHTML;
                else scheduleData[row].days[col] = el.innerHTML;
            }
        });

        setStatus('saving', 'Salvando estilo...');
        debouncedSave();
    }

    if(boldBtn) boldBtn.onclick = () => applyStyle('bold');
    if(underlineBtn) underlineBtn.onclick = () => applyStyle('underline');
    if(applyTextColorBtn) applyTextColorBtn.onclick = () => textColorPicker.click();
    if(applyFillBtn) applyFillBtn.onclick = () => fillColorPicker.click();
    if(alignLeftBtn) alignLeftBtn.onclick = () => applyStyle('textAlign', 'left');
    if(alignCenterBtn) alignCenterBtn.onclick = () => applyStyle('textAlign', 'center');
    if(alignRightBtn) alignRightBtn.onclick = () => applyStyle('textAlign', 'right');
    if(undoBtn) undoBtn.onclick = undo;

    // --- CHECKS ---
    scheduleBody.addEventListener('click', (e) => {
        const btn = e.target.closest('.cell-check');
        if (!btn) return;

        const row = parseInt(btn.dataset.row);
        const col = parseInt(btn.dataset.checkCol);

        if (!scheduleData[row].checks) scheduleData[row].checks = Array(8).fill(false);

        // Alterna o estado
        scheduleData[row].checks[col] = !scheduleData[row].checks[col];
        const checked = scheduleData[row].checks[col];

        // Atualiza o ícone sem re-renderizar a tabela inteira
        btn.innerHTML = checked
            ? '<i class="fas fa-circle-check" style="color:#22c55e;font-size:14px;"></i>'
            : '<i class="far fa-circle" style="color:#d1d5db;font-size:14px;"></i>';

        debouncedSave();
    });

    const clearChecksBtn = document.getElementById('clearChecksBtn');
    if (clearChecksBtn) {
        clearChecksBtn.addEventListener('click', () => {
            if (!confirm("Deseja limpar todos os checks marcados?")) return;
            pushSnapshot();
            scheduleData.forEach(row => { row.checks = Array(8).fill(false); });
            renderTable(scheduleData);
            saveToFirebase();
        });
    }
    
    // --- DRAG AND DROP ---
    function bindDragHandlers() {
        const handles = scheduleBody.querySelectorAll('.drag-handle');
        handles.forEach(h => {
            h.addEventListener('dragstart', (e) => {
                dragSrcIndex = Number(e.target.dataset.row);
                e.dataTransfer.effectAllowed = 'move';
                e.target.closest('tr').classList.add('dragging');
            });
            h.addEventListener('dragend', (e) => {
                e.target.closest('tr').classList.remove('dragging');
                document.querySelectorAll('.drop-target').forEach(r => r.classList.remove('drop-target'));
            });
        });
        scheduleBody.ondragover = (e) => {
            e.preventDefault();
            const tr = e.target.closest('tr');
            if(tr && !tr.classList.contains('dragging')) {
                document.querySelectorAll('.drop-target').forEach(r => r.classList.remove('drop-target'));
                tr.classList.add('drop-target');
            }
        };
        scheduleBody.ondrop = (e) => {
            e.preventDefault();
            const tr = e.target.closest('tr');
            if(!tr) return;
            const destIndex = Number(tr.dataset.row);
            if(dragSrcIndex !== null && dragSrcIndex !== destIndex) {
                pushSnapshot();
                const item = scheduleData.splice(dragSrcIndex, 1)[0];
                scheduleData.splice(destIndex, 0, item);
                renderTable(scheduleData);
                saveToFirebase();
            }
        };
    }

    // CORREÇÃO: Listener para o botão de LOGOUT funcionar nesta página
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('#btnLogout');
        if (btn) {
            e.preventDefault();
            if(confirm("Deseja realmente sair?")) {
                signOut(auth).then(() => {
                    window.location.href = 'index.html';
                }).catch((error) => {
                    console.error("Erro ao sair:", error);
                });
            }
        }
    });
    
    console.log("✅ Script carregado");
    </script>
    
    <script src="menu.js"></script>
</body>
